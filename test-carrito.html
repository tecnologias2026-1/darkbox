<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Carrito</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #1a1a2e; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #7c3aed; color: white; border: none; border-radius: 5px; }
        pre { background: #0f0f1e; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .result { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test del Carrito</h1>

        <h2>1. Prueba localStorage</h2>
        <button onclick="testLocalStorage()">Test localStorage</button>
        <div id="result-storage" class="result"></div>

        <h2>2. Agregar juego de prueba</h2>
        <button onclick="agregarJuegoPrueba()">Agregar Helldivers 2</button>
        <div id="result-agregar" class="result"></div>

        <h2>3. Ver contenido del carrito</h2>
        <button onclick="verCarrito()">Ver carrito</button>
        <div id="result-ver" class="result"></div>

        <h2>4. Limpiar carrito</h2>
        <button onclick="limpiarCarrito()">Limpiar</button>
        <div id="result-limpiar" class="result"></div>
    </div>

    <script src="js/carrito.js"></script>
    <script>
        function testLocalStorage() {
            try {
                localStorage.setItem('test', 'funciona');
                var valor = localStorage.getItem('test');
                localStorage.removeItem('test');
                document.getElementById('result-storage').innerHTML =
                    '<pre>✓ localStorage funciona correctamente\nValor guardado y recuperado: ' + valor + '</pre>';
            } catch (e) {
                document.getElementById('result-storage').innerHTML =
                    '<pre>✗ Error: ' + e.message + '</pre>';
            }
        }

        function agregarJuegoPrueba() {
            try {
                var juego = {
                    id: 'helldivers2',
                    nombre: 'HELLDIVERS™ 2',
                    genero: 'JcE/Acción/Cooperativo en línea',
                    precio: 149000,
                    imagen: 'https://a.storyblok.com/f/178900/768x432/1c7b91c44a/helldivers-2.jpg/m/filters:quality(95)format(webp)'
                };

                var antes = Carrito.obtener().length;
                var resultado = Carrito.agregar(juego);
                var despues = Carrito.obtener().length;

                document.getElementById('result-agregar').innerHTML =
                    '<pre>Juegos antes: ' + antes + '\nJuego agregado: ' + resultado + '\nJuegos después: ' + despues + '\n\nDatos guardado:\n' +
                    JSON.stringify(juego, null, 2) + '</pre>';
            } catch (e) {
                document.getElementById('result-agregar').innerHTML =
                    '<pre>✗ Error: ' + e.message + '\n' + e.stack + '</pre>';
            }
        }

        function verCarrito() {
            try {
                var carrito = Carrito.obtener();
                document.getElementById('result-ver').innerHTML =
                    '<pre>Total juegos: ' + carrito.length + '\n\n' +
                    JSON.stringify(carrito, null, 2) + '</pre>';
            } catch (e) {
                document.getElementById('result-ver').innerHTML =
                    '<pre>✗ Error: ' + e.message + '</pre>';
            }
        }

        function limpiarCarrito() {
            try {
                localStorage.removeItem('darkbox_carrito');
                document.getElementById('result-limpiar').innerHTML =
                    '<pre>✓ Carrito limpiado\nTotal juegos: ' + Carrito.obtener().length + '</pre>';
            } catch (e) {
                document.getElementById('result-limpiar').innerHTML =
                    '<pre>✗ Error: ' + e.message + '</pre>';
            }
        }
    </script>
</body>
</html>
