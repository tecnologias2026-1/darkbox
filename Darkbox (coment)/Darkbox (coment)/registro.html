<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKBOX — Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <header>
        <div class="contenedor">
            <a href="home.html" class="logo">DARKBOX</a>

            <div class="buscador">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Buscar juegos..." aria-label="Buscar juegos">
            </div>

            <a href="login.html" class="btn-login">Iniciar Sesión</a>
        </div>
    </header>

    <main>
        <section class="tarjeta-registro" aria-labelledby="registroTitulo">
            <div class="registro-header">
                <h1 class="logo-grande" id="registroTitulo">DARKBOX</h1>
                <p class="subtitulo">Crea tu cuenta</p>
            </div>

            <form class="form-registro" onsubmit="return validarRegistro(event)">
                <div class="campo">
                    <label for="nombre">Nombre</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name">
                    </div>
                </div>

                <div class="campo">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
                    </div>
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>

                <p class="msg error" id="msgError"></p>
                <p class="msg exito" id="msgExito"></p>

                <button type="submit" class="btn-submit">Registrarse</button>

                <a href="login.html" class="link-login">¿Ya tienes cuenta? Inicia sesión</a>
            </form>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="buscar.js"></script>
    <script>
        function validarRegistro(event) {
            event.preventDefault();

            var nombre = document.getElementById('nombre').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var msgError = document.getElementById('msgError');
            var msgExito = document.getElementById('msgExito');

            msgError.classList.remove('visible');
            msgExito.classList.remove('visible');

            function mostrarError(texto) {
                msgError.textContent = texto;
                msgError.classList.add('visible');
                return false;
            }

            if (!nombre) return mostrarError('Ingresa tu nombre.');
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return mostrarError('Ingresa un email valido.');
            if (password.length < 6) return mostrarError('La contrasena debe tener al menos 6 caracteres.');

            var nuevoUsuario = Auth.crearUsuario({
                nombre: nombre,
                email: email,
                password: password
            });

            if (!nuevoUsuario) {
                return mostrarError('Este email ya esta registrado.');
            }

            Auth.guardarSesion(nuevoUsuario);
            msgExito.textContent = 'Cuenta creada. Redirigiendo...';
            msgExito.classList.add('visible');

            setTimeout(function () {
                window.location.href = 'home-sesion.html';
            }, 1200);

            return false;
        }
    </script>
</body>
</html>
