<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>DARKBOX — Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-c.css">
</head>
<body>
 
    <header><div class="contenedor">
            <a href="home.html" class="logo">DARKBOX</a>
            <div class="buscador">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" placeholder="Buscar juegos...">
            </div>
            <button class="btn-iniciar">Iniciar Sesión</button>
        </div>
    </header>
 
    <main>
        <div class="tarjeta-login">
 
            <div class="login-header">
                <h1 class="logo-grande">DARKBOX</h1>
                <p class="subtitulo">Inicia sesión para continuar</p>
            </div>
 
            <!-- onsubmit llama a validarLogin cuando el usuario envía el formulario -->
            <form onsubmit="return validarLogin(event)" class="form-login">
 
                <div class="campo">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
                    </div>
                </div>
 
                <div class="campo">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>
 
                <!-- Mensaje de error: oculto por defecto, aparece si las credenciales son incorrectas -->
                <p class="error-msg" id="errorMsg">Email o contraseña incorrectos.</p>
 
                <button type="submit" class="btn-submit">Iniciar Sesión</button>
 
                <a href="registro.html" class="link-registro">¿No tienes cuenta? Regístrate</a>
 
            </form>
 
            <!-- Los spans están vacíos, JavaScript los llena al cargar la página -->
            <div class="cuenta-prueba">
                <p class="prueba-titulo">Cuenta de prueba:</p>
                <p>Email: <span id="txt-email"></span></p>
                <p>Contraseña: <span id="txt-pass"></span></p>
            </div>
 
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        /* Credenciales de demostración */
        var p1 = 'dem';
        var p2 = 'o';
        var p3 = 'darkbox';
        var p4 = '.com';
        document.getElementById('txt-email').textContent = p1 + p2 + '@' + p3 + p4;
        document.getElementById('txt-pass').textContent  = 'demo' + '123';
 
        function validarLogin(event) {
            event.preventDefault();
 
            var email    = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorMsg = document.getElementById('errorMsg');
 
            var EMAIL_DEMO = 'demo@darkbox.com';
            var PASS_DEMO  = 'demo123';

            var usuario = Auth.validarCredenciales(email, password);
            
            if (!usuario && email === EMAIL_DEMO && password === PASS_DEMO) {
                usuario = { nombre: 'Demo', email: EMAIL_DEMO };
            }

            if (usuario) {
                Auth.guardarSesion(usuario);
                window.location.href = 'home-sesion.html';
            } else {
                errorMsg.classList.add('visible');
            }
 
            return false;
        }
    </script>
</body>
</html>
<script src="buscar.js"></script>
