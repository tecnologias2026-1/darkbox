<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DARKBOX – ¡Compra Exitosa!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Rajdhani:wght@500;600&family=Material+Icons&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/pago.css">
</head>
<body>

<input type="checkbox" id="toggle-menu">

<!-- Header -->
<header><div class="contenedor">
        <a href="../home-sesion.html" class="logo">DARKBOX</a>
        <div class="buscador">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Buscar juegos...">
        </div>
        <nav>
            <button onclick="window.location.href='../biblioteca.html'"><span class="material-icons">library_books</span> Biblioteca</button>
            <!-- Badge en 0 porque el carrito se vació al comprar -->
            <button class="btn-carrito-header" onclick="window.location.href='../carrito.html'">
                🛒 Carrito
                <span id="carrito-badge" class="carrito-badge" style="display:none;">0</span>
            </button>
            <span>👤 Usuario Demo</span>
            <a href="../home.html" class="btn-salir">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </nav>
        <label for="toggle-menu" class="hamburguesa">
            <span></span><span></span><span></span>
        </label>
    </div>
</header>

<div class="menu-movil">
    <button onclick="window.location.href='../biblioteca.html'"><span class="material-icons">library_books</span> Biblioteca</button>
    <button onclick="window.location.href='../carrito.html'">🛒 Carrito</button>
    <span>👤 Usuario Demo</span>
    <a href="../home.html" class="btn-salir-movil">↪ Salir</a>
</div>

<!-- MAIN – Pantalla de compra exitosa -->
<main>
<div class="exitosa-pagina">

    <!-- Ícono de check verde animado -->
    <div class="exitosa-icono">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- Círculo exterior -->
            <circle cx="12" cy="12" r="10"/>
            <!-- Palomita / check -->
            <polyline points="9 12 11 14 15 10"/>
        </svg>
    </div>

    <!-- Título y mensaje -->
    <h1 class="exitosa-titulo">¡Compra Exitosa!</h1>
    <p class="exitosa-mensaje">
        Tus juegos han sido agregados a tu biblioteca y ya puedes jugarlos.
    </p>

    <!-- Dos botones de acción -->
    <div class="exitosa-botones">

        <!-- Botón principal: Ver Biblioteca -->
        <a href="../biblioteca.html" class="btn-biblioteca">
            Ver Mi Biblioteca
        </a>

        <!-- Botón secundario: Volver a la tienda -->
        <a href="../home-sesion.html" class="btn-tienda">
            Volver a la Tienda
        </a>

    </div>

</div>
</main>

<script src="../js/carrito.js"></script>
<script>
    /* El carrito ya fue vaciado en pago.html antes de redirigir.
       Solo actualizamos el badge para que muestre 0. */
    Carrito.actualizarBadge();
</script>

</body>
</html>
